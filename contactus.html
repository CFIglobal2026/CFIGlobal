x<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - CFI Global</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #e8f3ff, #f8fbff);
}

/* SECTION */
.contact-section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

/* HEADING */
.heading {
  text-align: center;
  font-size: 36px;
}

.heading span {
  color: #0a66c2;
}

.subtext {
  text-align: center;
  color: #666;
  margin-bottom: 40px;
}

/* GRID */
.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

/* GLASS EFFECT */
.glass {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-5px);
}

/* FORM */
form input, form textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

form button {
  background: #0a66c2;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 25px;
  cursor: pointer;
  width: 100%;
}

form button:hover {
  background: #084a99;
}

/* WHATSAPP BUTTON */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 12px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 14px;
}

/* MAP */
.map {
  margin-top: 40px;
  border-radius: 15px;
  overflow: hidden;
}

/* RESPONSIVE */
@media(max-width:768px){
  .contact-wrapper {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<section class="contact-section">
<div class="container">

<h2 class="heading">Contact <span>CFI Global</span></h2>
<p class="subtext">We are here to help you 24/7</p>

<div class="contact-wrapper">

<!-- LEFT -->
<div class="glass">
<h3>📞 Contact Information</h3>

<p>📧 Email: info@cfiglobal.in</p>
<p>📱 Phone: +91 9403892936</p>
<p>📍 Locations: Mohali, Delhi, Patna, Ranchi, Kolkata</p>

</div>

<!-- RIGHT -->
<div class="glass">
<h3>📝 Send Us a Message</h3>

<!-- FORM WORKING (Formspree) -->
<form action="https://formspree.io/f/mayvlrpg" method="POST">

<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<input type="tel" name="phone" placeholder="Your Phone Number" required>
<textarea name="message" rows="4" placeholder="Your Message"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</div>

<!-- GOOGLE MAP -->
<div class="map">
<iframe 
  src="https://maps.google.com/maps?q=kolkata&t=&z=10&ie=UTF8&iwloc=&output=embed"
  width="100%" height="300" style="border:0;">
</iframe>
</div>

</div>
</section>

<!-- WHATSAPP BUTTON -->
<a class="whatsapp" 
href="https://wa.me/919403892936" target="_blank">
💬 Chat on WhatsApp
</a>

</body>
</html>
